name: Build for release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build App
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9 (x86)
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: x86
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt -PathType Leaf) { pip install -r requirements.txt }
          pip install pytest
      - name: Run tests
        id: run-tests
        run: |
          $output = python -m pytest tests/ -v --tb=short 2>&1 | Out-String
          Write-Output $output
          "test_result<<EOF" >> $env:GITHUB_OUTPUT
          $output >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT
      - name: Display test results
        run: |
          echo "${{ steps.run-tests.outputs.test_result }}"
      - name: Build installer binary
        run: |
          pyinstaller --onefile --windowed main.py
      - name: Build uninstaller binary
        run: |
          pyinstaller --onefile --windowed --name Uninstall uninstaller.py
      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2.2.2
        with:
          files: |
            ./dist/main.exe
            ./dist/Uninstall.exe
  changelog:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout all
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate changelog
        run: git-cliff >> CHANGELOG.md

      - name: Add changelog to release
        uses: softprops/action-gh-release@v2.2.2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
