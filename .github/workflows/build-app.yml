name: Build for PR and pushes

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9 (x86)
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: x86
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt -PathType Leaf) { pip install -r requirements.txt }
          pip install pytest pytest-md
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
      - name: Build installer binary
        run: |
          pyinstaller --onefile --windowed main.py
      - name: Build uninstaller binary
        run: |
          pyinstaller --onefile --windowed --name Uninstall uninstaller.py
      - name: Upload installer binary
        uses: actions/upload-artifact@v4
        with:
          name: installer windows.exe
          path: ./dist/main.exe
      - name: Upload uninstaller binary
        uses: actions/upload-artifact@v4
        with:
          name: uninstaller windows.exe
          path: ./dist/Uninstall.exe
