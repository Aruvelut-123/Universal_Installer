name: Build for PR and pushes

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build_windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build binary (Nuitka)
        run: |
          python -m nuitka --onefile --windows-disable-console --include-module=vdf --windows-icon-from-ico=pack/icon.ico --enable-plugin=pyside6 --assume-yes-for-downloads main.py
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: ./main.exe

  build_linux:
    name: Build for Linux (AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libegl1 libgl1 libopengl0 libxkbcommon0 \
            libdbus-1-3 libfuse2 patchelf \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxcb-xkb1 \
            file
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build binary (Nuitka)
        run: |
          python -m nuitka \
            --standalone \
            --include-module=vdf \
            --enable-plugin=pyside6 \
            --assume-yes-for-downloads \
            --deployment \
            --output-dir=build \
            main.py
          cp build/main.dist/main main.bin
          chmod +x main.bin
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux-binary
          path: ./main.bin
      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          
          # 复制主程序
          cp main.bin AppDir/usr/bin/main
          chmod +x AppDir/usr/bin/main
          
          # 复制 PySide6 和 Qt 依赖（只复制 .so 文件，不复制子目录）
          PYSIDE_PATH=$(python -c "import PySide6, os; print(os.path.dirname(PySide6.__file__))")
          if [ -d "$PYSIDE_PATH/Qt/lib" ]; then
            find $PYSIDE_PATH/Qt/lib -maxdepth 1 -name "*.so*" -exec cp {} AppDir/usr/lib/ \; 2>/dev/null || true
          fi
          
          # 复制必要的系统库
          LIBRARIES=(
            "libxkbcommon.so.0"
            "libdbus-1.so.3"
            "libEGL.so.1"
            "libGL.so.1"
            "libOpenGL.so.0"
            "libGLX.so.0"
            "libGLdispatch.so.0"
            "libxcb-xinerama.so.0"
            "libxcb-icccm.so.4"
            "libxcb-image.so.0"
            "libxcb-keysyms.so.1"
            "libxcb-randr.so.0"
            "libxcb-render-util.so.0"
            "libxcb-shape.so.0"
            "libxcb-xfixes.so.0"
            "libxcb-xkb.so.1"
            "libxcb.so.1"
            "libX11.so.6"
            "libXext.so.6"
            "libXi.so.6"
            "libXrender.so.1"
            "libXcursor.so.1"
            "libXfixes.so.3"
            "libXrandr.so.2"
            "libXdamage.so.1"
            "libXcomposite.so.1"
            "libdrm.so.2"
            "libgbm.so.1"
          )
          
          for lib in "${LIBRARIES[@]}"; do
            find /usr/lib -name "$lib" 2>/dev/null | head -1 | xargs -r cp {} AppDir/usr/lib/ || true
          done
          
          # 设置 rpath
          patchelf --set-rpath '$ORIGIN/../lib' AppDir/usr/bin/main || true
          
          # 创建 AppRun 脚本（关键！）
          cat > AppDir/AppRun << 'APPRUNEOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          
          # 设置库路径
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          
          # Qt 环境变量
          export QT_PLUGIN_PATH="$HERE/usr/lib/qt5/plugins:$QT_PLUGIN_PATH"
          export QML_IMPORT_PATH="$HERE/usr/lib/qt5/qml:$QML_IMPORT_PATH"
          export QML2_IMPORT_PATH="$HERE/usr/lib/qt5/qml:$QML2_IMPORT_PATH"
          
          # 禁用 Qt 缩放（避免缩放问题）
          export QT_AUTO_SCREEN_SCALE_FACTOR=0
          export QT_SCALE_FACTOR=1
          
          # 执行主程序
          exec "$HERE/usr/bin/main" "$@"
          APPRUNEOF
          chmod +x AppDir/AppRun
          
          # 创建图标
          python3 -c "from PIL import Image; img = Image.open('pack/icon.ico'); img.save('AppDir/icon.png')"
          
          # 创建 .desktop 文件
          cat > AppDir/main.desktop << 'DESKTOPEOF'
          [Desktop Entry]
          Name=ChinesePack
          Exec=main
          Icon=icon
          Type=Application
          Categories=Utility;
          DESKTOPEOF
      - name: Optimize AppDir size
        run: |
          # 移除不需要的 .py 文件
          find AppDir -name "*.py" -type f -delete
          find AppDir -name "*.pyc" -type f -delete
          
          # 移除调试符号
          strip AppDir/usr/bin/main 2>/dev/null || true
          find AppDir/usr/lib -name "*.so*" -exec strip --strip-unneeded {} \; 2>/dev/null || true
      - name: Build AppImage
        run: |
          wget -nv "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage -v AppDir main.AppImage
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux-AppImage
          path: ./main.AppImage

  build_macos:
    name: Build for macOS (.app)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Convert icon to .icns
        run: |
          python3 -c "
          from PIL import Image
          img = Image.open('pack/icon.ico')
          img.save('pack/icon.icns', format='ICNS')
          print('icon.icns created')
          "
      - name: Build .app bundle (Nuitka)
        run: |
          python -m nuitka --onefile --macos-create-app-bundle --macos-app-icon=pack/icon.icns --include-module=vdf --enable-plugin=pyside6 --assume-yes-for-downloads main.py
      - name: Codesign (ad-hoc)
        run: |
          codesign --force --deep --sign - main.app
          echo "Ad-hoc signing done. Users will need to right-click → Open the first time."
      - name: Archive .app for upload
        run: |
          ditto -c -k --keepParent main.app BB+Installer-macos.zip
      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: ./BB+Installer-macos.zip
